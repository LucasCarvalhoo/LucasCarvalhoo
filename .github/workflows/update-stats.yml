name: Update GitHub Profile Stats

on:
  schedule:
    - cron: "0 */12 * * *" # a cada 6 horas
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    
      - name: Garantir pasta de saída
        run: mkdir -p assets

      # ⭐ Estatísticas gerais (Readme Stats)
      - name: Download GitHub Stats Card
        run: |
          curl -fsSL -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            -o assets/stats.svg \
            "https://github-readme-stats-sigma-five.vercel.app/api?username=LucasCarvalhoo&show_icons=true&theme=dracula&include_all_commits=true&count_private=true&hide_border=true"

      # 🌐 Linguagens mais usadas
      - name: Download Top Languages Card
        run: |
          curl -fsSL -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            -o assets/top-langs.svg \
            "https://github-readme-stats-sigma-five.vercel.app/api/top-langs/?username=LucasCarvalhoo&layout=compact&theme=dracula&hide_border=true&count_private=true"

      # 📤 Commit e push
      - name: Commit e push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/stats.svg assets/top-langs.svg
          git diff --staged --quiet || (git commit -m "📊 Atualizar métricas do perfil" && git push)
