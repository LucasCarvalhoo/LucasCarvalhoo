name: Update GitHub Profile Stats

on:
  schedule:
    - cron: "0 0 */7 * *" # a cada 7 dias
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    
      - name: Garantir pasta de saída
        run: mkdir -p assets

      # 📊 Linguagens (lowlighter/metrics)
      - name: Generate GitHub Metrics (linguagens usadas)
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-stack.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: "" # sem card padrão
          plugin_languages: yes
          plugin_languages_ignored: html, css, python
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_analysis_timeout: 15

      # ⭐ Estatísticas gerais (Readme Stats)
      - name: Download GitHub Stats Card
        run: |
          curl -fsSL \
            -o assets/stats.svg \
            "https://github-readme-stats.vercel.app/api?username=LucasCarvalhoo&show_icons=true&theme=dracula&include_all_commits=true&count_private=true&hide_border=true"

      # 📤 Commit e push
      - name: Commit e push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/metrics-stack.svg assets/stats.svg
          git diff --staged --quiet || (git commit -m "📊 Atualizar métricas do perfil" && git pull --rebase origin main && git push)
